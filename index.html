<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#170F22">
<title>Lançamentos</title>
<meta name="description" content="Registre lançamentos financeiros direto na sua planilha.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236F4FF2'/%3E%3Ctext x='50' y='66' font-size='54' text-anchor='middle' fill='white' font-family='sans-serif'%3ER%24%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..600,0..1,0" >

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

  <!-- Header -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">R$</span>
      <span class="brand-name">Lançamentos</span>
    </div>
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Alternar modo claro e escuro" title="Alternar tema">
      <span class="material-symbols-rounded" id="themeIcon" aria-hidden="true">dark_mode</span>
    </button>
  </header>

  <!-- Card -->
  <main class="card" id="card">

    <!-- Tipo segmented control — drives the "money mood" of the whole card -->
    <div class="segmented" role="radiogroup" aria-label="Tipo de lançamento">
      <button type="button" class="segment" data-tipo="despesa" role="radio" aria-checked="false">
        <span class="material-symbols-rounded" aria-hidden="true">trending_down</span>
        Despesa
      </button>
      <button type="button" class="segment" data-tipo="receita" role="radio" aria-checked="false">
        <span class="material-symbols-rounded" aria-hidden="true">trending_up</span>
        Receita
      </button>
      <div class="segment-glide" id="segmentGlide" aria-hidden="true"></div>
    </div>

    <!-- Amount, the hero of the form -->
    <div class="amount-field">
      <label for="valor" class="amount-label">Valor</label>
      <div class="amount-wrap">
        <span class="amount-prefix" aria-hidden="true">R$</span>
        <input
          type="text"
          inputmode="decimal"
          id="valor"
          class="amount-input"
          placeholder="0,00"
          autocomplete="off"
        >
      </div>
    </div>

    <!-- Description -->
    <div class="field">
      <label for="descricao">Descrição</label>
      <input
        type="text"
        id="descricao"
        placeholder="Ex.: Mercado Guanabara"
        autocomplete="off"
        maxlength="80"
      >
    </div>

    <!-- Category + Person -->
    <div class="field-row">
      <div class="field">
        <label for="categoria">Categoria</label>
        <div class="select-wrap">
          <select id="categoria">
            <option value="" disabled selected>Selecione</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Gasolina">Gasolina</option>
            <option value="Lazer">Lazer</option>
            <option value="Fixo">Fixo</option>
            <option value="Investimento">Investimento</option>
            <option value="Manutenção de Veículos">Manutenção de Veículos</option>
            <option value="Presentes/Outros">Presentes/Outros</option>
          </select>
          <span class="material-symbols-rounded select-caret" aria-hidden="true">expand_more</span>
        </div>
      </div>

      <div class="field">
        <label for="pessoa">Pessoa</label>
        <div class="select-wrap">
          <select id="pessoa">
            <option value="" disabled selected>Selecione</option>
            <option value="Everton">Everton</option>
            <option value="Maysa">Maysa</option>
          </select>
          <span class="material-symbols-rounded select-caret" aria-hidden="true">expand_more</span>
        </div>
      </div>
    </div>

    <!-- Feedback -->
    <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

    <!-- Submit -->
    <button type="button" id="saveBtn" class="save-btn">
      <span class="save-label">Salvar lançamento</span>
      <span class="spinner" id="spinner" aria-hidden="true"></span>
    </button>

  </main>

  <!-- Last entry — persisted locally on this device -->
  <section class="last-entry" id="lastEntry" hidden aria-live="polite">
    <p class="last-entry-eyebrow">Último lançamento</p>
    <div class="last-entry-row">
      <div class="last-entry-info">
        <p class="last-entry-desc" id="lastEntryDesc"></p>
        <p class="last-entry-meta" id="lastEntryMeta"></p>
      </div>
      <p class="last-entry-valor" id="lastEntryValor"></p>
    </div>
  </section>

  <p class="footnote">Os dados são enviados direto para a sua planilha.</p>

</div>

<script src="app.js"></script>
</body>
</html>
